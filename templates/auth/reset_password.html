<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password - {{ brand_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="page">
    <div class="shell">
        <div class="top-bar">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true"></div>
                <div>
                    <h1>Password reset</h1>
                    <p>Restore access to your {{ brand_name }} console.</p>
                </div>
            </div>
            <div class="nav">
                <a href="/">Home</a>
                <a class="nav-primary" href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>

        <div class="card auth-card fade-up">
            <div class="section-title">
                <h2>Send reset email</h2>
                <p>We will email you a link to reset your password.</p>
            </div>
            {% if error %}
            <div class="notice error" style="margin-bottom: 14px;">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="notice success" style="margin-bottom: 14px;">{{ success }}</div>
            {% endif %}
            <form method="POST" class="form-grid">
                <input type="email" name="email" placeholder="Enter your email" required>
                <button type="submit" class="btn btn-secondary">Send reset email</button>
            </form>
            <div class="link-row">
                <a href="{{ url_for('auth.login') }}">Back to login</a>
                <a href="{{ url_for('index') }}">Back to home</a>
            </div>
        </div>
    </div>
</body>
</html>
