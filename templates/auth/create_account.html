<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="page">
    <div class="shell">
        <div class="top-bar">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true"></div>
                <div>
                    <h1>Honeypot Control</h1>
                    <p>Build your operator profile.</p>
                </div>
            </div>
            <div class="nav">
                <a href="/">Home</a>
                <a class="nav-primary" href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>

        <div class="card auth-card fade-up">
            <div class="section-title">
                <h2>Create account</h2>
                <p>Secure your first workspace in minutes.</p>
            </div>
            {% if error %}
            <div class="notice error" style="margin-bottom: 14px;">{{ error }}</div>
            {% endif %}
            <form method="POST" class="form-grid">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-success">Create account</button>
            </form>
            <div class="link-row">
                <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>
                <a href="{{ url_for('index') }}">Back to home</a>
            </div>
        </div>
    </div>
</body>
</html>
