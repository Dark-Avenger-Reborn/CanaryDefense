<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-container { max-width: 400px; margin: 0 auto; }
        input { display: block; margin: 10px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; background-color: #ffc107; color: black; border: none; cursor: pointer; width: 100%; }
        button:hover { background-color: #e0a800; }
        .error { color: red; margin: 10px 0; }
        .success { color: green; margin: 10px 0; }
        .link { margin-top: 20px; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Reset Password</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}
        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Email</button>
        </form>
        <div class="link">
            <p><a href="{{ url_for('auth.login') }}">Back to login</a></p>
            <p><a href="{{ url_for('index') }}">Back to home</a></p>
        </div>
    </div>
</body>
</html>
